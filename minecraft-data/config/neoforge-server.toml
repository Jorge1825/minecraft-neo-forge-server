# Configuración de NeoForge Server 1.21.1
# Este archivo permite conexiones más flexibles entre cliente y servidor

[clientSideOnly]
# Permitir que el servidor funcione aunque el cliente no tenga los mismos mods
# Cuidado: Esto puede causar problemas si se usan mods que afectan el gameplay
allowServerListings = false

[forge]
# No requerir firma de mods para conectar (experimental)
disableVersionCheck = true
# Permitir conexiones aunque el cliente tenga diferentes versiones de mods
lazyLoadEntities = true
sortRecipies = true

[mods]
# Configuración de carga de mods
```

# Nota: En NeoForge 1.21.1, algunas de estas opciones pueden no estar disponibles
# La verificación estricta de versiones está integrada en el núcleo de NeoForge
